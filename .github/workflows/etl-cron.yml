name: Daily ETL Digest

on:
  schedule:
    - cron: '30 19 * * *'  # 1am IST = 19:30 UTC daily
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ETL
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://www.taiwanmaami.com/api/service/etl/run \
            -H "X-Service-Token: ${{ secrets.MAAMITECH_SERVICE_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "ETL response code: $response"
          if [ "$response" != "200" ]; then
            echo "ETL failed with status $response"
            exit 1
          fi
          echo "ETL completed successfully"
