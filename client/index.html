    <!-- Structured Data - FAQPage -->

    {
      "@context": "https://schema.org",
      "@type": "FAQPage",

        {
          "@type": "Question",
          "name": "What is Taiwan Maami?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Taiwan Maami is Chennai's premium Taiwanese bubble tea and Asian street food cafe, serving authentic boba tea made with organic whole-leaf tea and imported tapioca pearls from Taiwan, along with mochi, Asian rice dishes, noodles, and flatbreads."
          }
        },
        {
          "@type": "Question",
          "name": "Where is Taiwan Maami located in Chennai?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Taiwan Maami has two outlets in Chennai: 1) First Floor, Palladium Mall, Velachery (10 AM - 10 PM), and 2) Moutan by Taiwan Maami at New No. 29, Burkit Road, T Nagar (12 PM - 12 AM). Both locations offer dine-in, pickup, and delivery."
          }
        },
        {
          "@type": "Question",
          "name": "Does Taiwan Maami offer home delivery?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Taiwan Maami offers home delivery within 10 km of T Nagar, Chennai. Flat delivery fee of ₹100, with free delivery on orders above ₹2500. You can order directly from our website or via WhatsApp."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Taiwan Maami loyalty programme?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our loyalty programme rewards you with stamps for every ₹450 spent. Collect 10 stamps and receive a free drink! Stamps are tracked automatically when you log in and order through our website."
          }
        },
        {
          "@type": "Question",
          "name": "What types of bubble tea does Taiwan Maami serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We serve organic whole-leaf bubble tea in varieties including Assam Black Tea, Oolong Tea, Green Tea, Matcha Blend, and Taro Blend. All teas are available in Petite, Regular, and Large sizes with optional boba (tapioca pearls) and customisable sugar and ice levels."
          }
        },
        {
          "@type": "Question",
          "name": "Does Taiwan Maami serve food besides bubble tea?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Our food menu includes ChickGozilla (signature fried chicken), Asian rice dishes, noodle soups, saucy noodles, Taiwanese flatbreads (蔥油餅), Japanese-style omelettes, and pillow brioche. We also serve fresh fruit mochi, signature mochi, and boba crème caramel desserts."
          }
        }
      ]
    }
    </script>
