<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Primary Meta Tags -->
    <title>Taiwan Maami - Authentic Taiwanese Bubble Tea in Chennai</title>
    <meta name="title" content="Taiwan Maami - Authentic Taiwanese Bubble Tea in Chennai" />
    <meta name="description" content="Premium bubble tea with imported tapioca pearls from Taiwan. Visit T Nagar Chennai. Delivery & dine-in available!" />
    <meta name="keywords" content="bubble tea Chennai, Taiwan Maami, boba tea, mochi Chennai, Asian food Chennai, tapioca pearls" />
    <meta name="author" content="Taiwan Maami - Thamarai Foods and Trading Private Limited" />
    <meta name="robots" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.taiwanmaami.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.taiwanmaami.com/" />
    <meta property="og:title" content="Taiwan Maami - Authentic Taiwanese Bubble Tea in Chennai" />
    <meta property="og:description" content="Order premium bubble tea crafted with imported tapioca pearls from Taiwan. Visit us at T Nagar, Chennai. Delivery available!" />
    <meta property="og:image" content="https://www.taiwanmaami.com/taiwan-maami-og-image.jpg" />
    <meta property="og:site_name" content="Taiwan Maami" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.taiwanmaami.com/" />
    <meta name="twitter:title" content="Taiwan Maami - Authentic Taiwanese Bubble Tea in Chennai" />
    <meta name="twitter:description" content="Order premium bubble tea crafted with imported tapioca pearls from Taiwan. Delivery, pickup & dine-in available!" />
    <meta name="twitter:image" content="https://www.taiwanmaami.com/taiwan-maami-og-image.jpg" />

    <!-- Geo Tags for Local SEO -->
    <meta name="geo.region" content="IN-TN" />
    <meta name="geo.placename" content="Chennai" />
    <meta name="geo.position" content="12.9716;80.2209" />
    <meta name="ICBM" content="12.9716, 80.2209" />

    <!-- Google Fonts - Jost (Futura-style) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Taiwan Maami",
      "alternateName": "Thamarai Foods and Trading Private Limited",
      "url": "https://www.taiwanmaami.com",
      "logo": "https://www.taiwanmaami.com/taiwan-maami-logo-full.png",
      "sameAs": [
        "https://www.instagram.com/taiwan_maami/",
        "https://www.facebook.com/Taiwanmaami",
        "https://x.com/taiwanmaami",
        "https://www.threads.net/@taiwan_maami",
        "https://youtube.com/@theresahucy"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-89259-14303",
        "contactType": "customer service",
        "areaServed": "IN",
        "availableLanguage": ["English", "Tamil"]
      }
    }
    </script>

    <!-- Structured Data - Restaurant (T Nagar / Moutan) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Moutan by Taiwan Maami - T Nagar",
      "image": "https://www.taiwanmaami.com/images/interior2.jpg",
      "url": "https://www.taiwanmaami.com",
      "telephone": "+91-91505-70557",
      "priceRange": "₹₹",
      "servesCuisine": ["Taiwanese", "Bubble Tea", "Asian", "Street Food"],
      "acceptsReservations": "false",
      "menu": "https://www.taiwanmaami.com/menu",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "New No. 29, Burkit Road",
        "addressLocality": "T Nagar",
        "addressRegion": "Tamil Nadu",
        "postalCode": "600017",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 13.0418,
        "longitude": 80.2341
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
          "opens": "12:00",
          "closes": "00:00"
        }
      ]
    }
    </script>

    <!-- Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Taiwan Maami",
      "url": "https://www.taiwanmaami.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.taiwanmaami.com/menu?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
